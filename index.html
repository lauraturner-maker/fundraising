<!DOCTYPE html>
<html>
<head>
<style>
    :root {
        --usc-cardinal: #990000;
        --usc-gold: #FFC72C;
        --light-grey: #f4f4f4;
    }

    .usc-widget-container {
        font-family: 'National', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        max-width: 400px;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #fff;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .usc-header {
        color: var(--usc-cardinal);
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 2px solid var(--usc-gold);
        padding-bottom: 5px;
    }

    .goal-stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 0.9rem;
    }

    .current-amount {
        font-weight: bold;
        color: #333;
    }

    /* The Progress Bar Background */
    .progress-track {
        background-color: var(--light-grey);
        height: 25px;
        border-radius: 12.5px;
        width: 100%;
        overflow: hidden;
        margin-bottom: 15px;
    }

    /* The Moving Bar */
    .progress-fill {
        background: linear-gradient(90deg, var(--usc-cardinal), #ce0000);
        height: 100%;
        width: 0%; /* Initial state for animation */
        transition: width 1.5s ease-in-out;
        display: flex;
        align-items: center;
        justify-content: flex-end;
    }

    .percentage-label {
        color: white;
        font-size: 0.75rem;
        font-weight: bold;
        padding-right: 10px;
    }

    .usc-footer {
        font-size: 0.8rem;
        color: #666;
        font-style: italic;
        text-align: center;
    }

    .fight-on-btn {
        display: block;
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background-color: var(--usc-cardinal);
        color: white;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        border-radius: 4px;
        transition: background 0.3s;
    }

    .fight-on-btn:hover {
        background-color: #7a0000;
    }
</style>
</head>
<body>

<div class="usc-widget-container">
    <div class="usc-header">Annual Giving Goal</div>
    
    <div class="goal-stats">
        <span class="current-amount" id="raised-text">$0</span>
        <span class="goal-total">Goal: $5,000,000</span>
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progress-bar">
            <span class="percentage-label" id="perc-text">0%</span>
        </div>
    </div>

    <div class="usc-footer">
        Join the Trojan Family in making an impact.
    </div>

    <a href="https://giving.usc.edu" target="_blank" class="fight-on-btn">FIGHT ON!</a>
</div>

<script>
    // Configuration: Update these values
    const goal = 5000000;
    const raised = 3750000; // Example: 75% achieved
    
    // Calculation
    const percentage = Math.min((raised / goal) * 100, 100);

    // Animation
    window.onload = () => {
        const bar = document.getElementById('progress-bar');
        const percText = document.getElementById('perc-text');
        const raisedText = document.getElementById('raised-text');

        // Trigger CSS transition
        bar.style.width = percentage + '%';
        percText.innerText = Math.round(percentage) + '%';
        
        // Format currency for the text display
        raisedText.innerText = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            maximumFractionDigits: 0
        }).format(raised);
    };
</script>

</body>
</html>
